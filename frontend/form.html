<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Mirai AI Interview Platform</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.animated-bg {
  background: linear-gradient(
    -45deg,
    #667eea,
    #764ba2,
    #f093fb,
    #4facfe
  );
  background-size: 400% 400%;
  animation: gradient-shift 15s ease infinite;
}

.glass {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 20px;
}

</style>

</head>


<body class="animated-bg min-h-screen flex items-center justify-center p-4">


<div class="w-full max-w-lg glass p-8 shadow-2xl">


<!-- TITLE -->

<div class="text-center mb-6">

  <h1 class="text-3xl font-bold">
    Mirai AI Interview Platform
  </h1>

  <p class="text-gray-600">
    Interview conducted by Tachibana Hinata
  </p>

</div>



<h2 class="text-xl font-bold mb-4">
  Candidate Registration Form
</h2>



<input id="name"
placeholder="Full Name"
class="border p-2 w-full mb-3 rounded"
/>


<input id="email"
placeholder="Email"
class="border p-2 w-full mb-3 rounded"
/>


<input id="phone"
placeholder="Phone"
class="border p-2 w-full mb-3 rounded"
/>


<input id="college"
placeholder="College"
class="border p-2 w-full mb-3 rounded"
/>


<input id="degree"
placeholder="Degree"
class="border p-2 w-full mb-3 rounded"
/>


<input id="year"
placeholder="Year"
class="border p-2 w-full mb-3 rounded"
/>



<button
onclick="submitForm()"
class="bg-indigo-600 text-white px-4 py-2 rounded w-full"
>
Submit
</button>


<p id="msg" class="text-center mt-4 text-green-600"></p>


</div>



<script>

const API = "http://localhost:8000"


function getSessionId() {

  const params = new URLSearchParams(
    window.location.search
  )

  return params.get("session_id")

}



async function submitForm() {

  const session_id = getSessionId()

  if (!session_id) {

    alert("Invalid link")

    return

  }


  const data = {

    session_id: session_id,

    name: document.getElementById("name").value,

    email: document.getElementById("email").value,

    phone: document.getElementById("phone").value,

    college: document.getElementById("college").value,

    degree: document.getElementById("degree").value,

    year: document.getElementById("year").value

  }


  const res = await fetch(

    API + "/form/submit",

    {
      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify(data)
    }

  )


  if (res.ok) {

    document.getElementById("msg").innerText =
      "Form submitted successfully"

  }

  else {

    document.getElementById("msg").innerText =
      "Error submitting form"

  }

}

</script>


</body>
</html>
