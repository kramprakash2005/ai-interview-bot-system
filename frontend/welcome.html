<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mirai | Autonomous Interview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@200;400;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: { extend: { colors: { 'm-black': '#050505', 'm-indigo': '#6366f1' }, fontFamily: { sans: ['Public Sans', 'sans-serif'] } } }
    }
  </script>

  <style>
    body { background-color: #050505; color: white; overflow: hidden; height: 100vh; width: 100vw; margin: 0; }
    .view { display: none; height: 100vh; width: 100vw; flex-direction: column; justify-content: center; align-items: center; padding: 5rem; position: absolute; top: 0; left: 0; }
    .view.active { display: flex; animation: scaleIn 0.8s ease-out; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
    .bg-glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150vw; height: 150vh; background: radial-gradient(circle at center, rgba(99, 102, 241, 0.1) 0%, transparent 70%); z-index: -1; }
    .huge-input { background: transparent; border: none; border-left: 4px solid #6366f1; padding-left: 2rem; font-size: 2.5rem; line-height: 1.2; width: 100%; outline: none; color: #cbd5e1; transition: all 0.5s; }
    .huge-input:focus { color: white; border-left-width: 12px; }
    .mic-active { color: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  </style>
</head>

<body class="font-sans antialiased" onclick="initAudioContext()">
  <div class="bg-glow"></div>

  <div id="view-welcome" class="view active">
    <div class="text-left w-full max-w-7xl">
      <h1 class="text-[12vw] font-black tracking-tighter leading-none mb-8">MIRAI</h1>
      <p class="text-4xl text-slate-500 font-light max-w-4xl leading-tight mb-20">
        I am <span class="text-white font-normal">Tachibana Hinata</span>. Preparing your environment.
      </p>
      <button onclick="show('view-upload')" class="text-2xl font-bold border-b-4 border-m-indigo pb-2 uppercase tracking-widest">
        Begin Session
      </button>
    </div>
  </div>

  <div id="view-upload" class="view">
    <div id="upload-stage" class="w-full max-w-7xl text-center">
      <h2 class="text-6xl font-black mb-12 uppercase">Upload Resume</h2>
      <input type="file" id="file-input" class="hidden" onchange="processFile()">
      <label for="file-input" class="text-[5vw] text-slate-700 hover:text-m-indigo cursor-pointer transition-all font-black">
        SELECT PDF +
      </label>
    </div>
    <div id="loading-stage" class="hidden w-full max-w-7xl text-center">
      <h3 class="text-6xl font-bold text-m-indigo mb-4 animate-pulse">Analyzing Data...</h3>
      <p class="text-xl text-slate-500 font-mono italic">Synchronizing with Mirai Core</p>
    </div>
  </div>

  <div id="view-interview" class="view fixed inset-0 z-50 bg-m-black !p-24">
    <div class="w-full h-full flex flex-col justify-between">
      <div class="flex justify-between items-start">
        <div class="text-xl font-black tracking-widest border-l-4 border-m-indigo pl-4 uppercase">Live Session</div>
        <div class="flex items-center gap-6">
            <button onclick="toggleSTT()" id="mic-btn" class="text-2xl text-slate-500 hover:text-white transition-colors" title="Speech to Text (Spacebar)">
                <i class="fas fa-microphone"></i>
            </button>
            <div id="hinata-status" class="text-m-indigo font-bold text-xs tracking-widest uppercase">Hinata Standing By</div>
        </div>
      </div>
      <div class="max-w-7xl w-full">
        <h2 id="display-question" class="text-6xl font-bold leading-tight mb-20 italic">Loading Question...</h2>
        <textarea id="answer-input" class="huge-input" placeholder="Type or speak your response..."></textarea>
      </div>
      <div class="flex justify-end">
        <button id="btn-submit" onclick="submitAndNext()" class="bg-white text-m-black px-20 py-8 font-black text-2xl rounded-full">
          SUBMIT ANSWER
        </button>
      </div>
    </div>
  </div>

  <div id="view-complete" class="view">
    <h1 class="text-[12vw] font-black tracking-tighter text-m-indigo">COMPLETE</h1>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";
    const params = new URLSearchParams(location.search);
    const p_id = params.get("participant_id");
    const s_id = params.get("session_id");

    let currentQuestion = "";
    let voice = null;
    let recognition = null;
    let isListening = false;
    let hasIntroduced = false;

    /* --- SPEECH TO TEXT (STT) --- */
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      
      recognition.onresult = (event) => {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          transcript += event.results[i][0].transcript;
        }
        document.getElementById('answer-input').value = transcript;
      };

      recognition.onend = () => {
        if (isListening) recognition.start(); // Keep listening if active
      };
    }

    function toggleSTT() {
      if (!recognition) return alert("STT not supported in this browser.");
      isListening = !isListening;
      const btn = document.getElementById('mic-btn');
      if (isListening) {
        recognition.start();
        btn.classList.add('mic-active');
      } else {
        recognition.stop();
        btn.classList.remove('mic-active');
      }
    }

    /* --- TEXT TO SPEECH (TTS) --- */
    function loadVoices() {
      voice = speechSynthesis.getVoices().find(v => v.name.includes("Female") || v.name.includes("Zira")) || null;
      // Auto-play intro immediately after voices are ready
      if (!hasIntroduced && voice) {
          playIntro();
      }
    }
    speechSynthesis.onvoiceschanged = loadVoices;

    function playIntro() {
      hasIntroduced = true;
      speak("Hello. I am Tachibana Hinata. Welcome to Mirai. Please click the button to begin our session.");
    }

    // Force play on first user interaction if blocked
    function initAudioContext() {
        if (!hasIntroduced) playIntro();
    }

    function speak(text) {
      speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      if (voice) msg.voice = voice;
      msg.pitch = 1.1;
      msg.onstart = () => document.getElementById('hinata-status').innerText = "Hinata Speaking";
      msg.onend = () => document.getElementById('hinata-status').innerText = "Hinata Standing By";
      speechSynthesis.speak(msg);
    }

    function show(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    async function processFile() {
      const f = document.getElementById('file-input').files[0];
      if (!f) return;
      document.getElementById('upload-stage').classList.add('hidden');
      document.getElementById('loading-stage').classList.remove('hidden');

      const fd = new FormData();
      fd.append("file", f);

      try {
        await fetch(`${API}/resume/upload/${p_id}`, { method: "POST", body: fd });
        await fetch(`${API}/interview/start?participant_id=${p_id}&session_id=${s_id}`, { method: "POST" });
        setTimeout(() => { show('view-interview'); fetchNext(); }, 2000);
      } catch (e) { alert("Connection Error."); }
    }

    async function fetchNext() {
      const res = await fetch(`${API}/interview/next/${p_id}`);
      const data = await res.json();
      if (data.status === "completed" || !data.question) {
        speak("Session complete. Evaluation generating.");
        show('view-complete');
        fetch(`${API}/evaluation/${p_id}`);
        return;
      }
      currentQuestion = data.question;
      document.getElementById('display-question').innerText = currentQuestion;
      document.getElementById('answer-input').value = "";
      speak(currentQuestion);
    }

    async function submitAndNext() {
      if (isListening) toggleSTT(); // Stop mic on submit
      const ans = document.getElementById('answer-input').value;
      if (!ans.trim()) return;
      document.getElementById('btn-submit').innerText = "SAVING...";
      await fetch(`${API}/interview/answer?participant_id=${p_id}&question=${encodeURIComponent(currentQuestion)}&answer=${encodeURIComponent(ans)}`, { method: "POST" });
      document.getElementById('btn-submit').innerText = "SUBMIT ANSWER";
      fetchNext();
    }

    // Keyboard support for STT
    window.onkeydown = (e) => {
        if (e.code === "Space" && document.activeElement.tagName !== "TEXTAREA") {
            e.preventDefault();
            toggleSTT();
        }
    };

    loadVoices();
  </script>
</body>
</html>
