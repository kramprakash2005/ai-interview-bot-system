<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Results - Mirai AI Interview</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.animated-bg {
  background: linear-gradient(
    -45deg,
    #667eea,
    #764ba2,
    #f093fb,
    #4facfe
  );
  background-size: 400% 400%;
  animation: gradient-shift 15s ease infinite;
}

.glass {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 20px;
}

</style>

</head>


<body class="animated-bg min-h-screen p-6">


<div class="max-w-6xl mx-auto">


<!-- HEADER -->

<div class="flex justify-between mb-6">

  <div>

    <h1 class="text-3xl font-bold text-white">
      Mirai AI Interview Platform
    </h1>

    <p class="text-white/80">
      Results • Tachibana Hinata
    </p>

  </div>

  <button
    onclick="goBack()"
    class="bg-white px-3 py-1 rounded"
  >
    Back
  </button>

</div>



<div class="glass p-6 shadow">

  <h2 class="text-xl font-bold mb-4">
    Candidates Result
  </h2>


  <table class="w-full">

    <thead>

      <tr class="border-b text-left">

        <th>Name</th>
        <th>Status</th>
        <th>Score</th>
        <th>Report</th>

      </tr>

    </thead>

    <tbody id="list">

    </tbody>

  </table>

</div>


</div>



<script>

const API = "http://localhost:8000"



function getSessionId() {

  const params =
    new URLSearchParams(
      window.location.search
    )

  return params.get("session_id")

}



function goBack() {

  window.location.href = "sessions.html"

}



async function load() {

  const session_id = getSessionId()

  const res = await fetch(
    API + "/participants/by-session/" + session_id
  )

  const data = await res.json()

  const list =
    document.getElementById("list")

  list.innerHTML = ""


  data.forEach(p => {

    const score =
      p.evaluation?.overall_score || "-"

    const status =
      p.status || "pending"


    list.innerHTML += `

    <tr class="border-b">

      <td>${p.name}</td>

      <td>${status}</td>

      <td>${score}</td>

      <td>

        <button
          onclick="openReport('${p._id}')"
          class="bg-indigo-600 text-white px-2 py-1 rounded"
        >
          View
        </button>

      </td>

    </tr>

    `

  })

}



function openReport(id) {

  window.location.href =
    "candidate_report.html?participant_id=" + id

}



load()

</script>


</body>
</html>
