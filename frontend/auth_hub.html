<!doctype html>
<html lang="en" id="theme-root">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Auth Hub | Mirai AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 'm-black': '#0f172a', 'm-indigo': '#6366f1' },
          fontFamily: { sans: ['Public Sans', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body { transition: background-color 0.3s ease; }
    .auth-card { 
      background: #ffffff; 
      border: 1px solid #e2e8f0; 
      border-radius: 1.25rem; 
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
    }
    .dark .auth-card { background: #1e293b; border-color: #334155; }
    
    .simple-input { 
      border: 1px solid #cbd5e1; 
      padding: 0.85rem; 
      width: 100%; 
      background: #ffffff; 
      border-radius: 0.75rem;
      transition: all 0.2s;
    }
    .dark .simple-input { background: #0f172a; border-color: #334155; color: #fff; }
    .simple-input:focus { outline: none; border-color: #6366f1; ring: 2px; ring-color: #6366f1; }

    .btn-primary { 
      background: #6366f1; 
      color: white; 
      border-radius: 0.75rem; 
      font-weight: 700; 
      transition: all 0.2s; 
    }
    .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }

    .otp-box { 
      width: 48px; 
      height: 60px; 
      text-align: center; 
      font-size: 1.5rem; 
      font-weight: 800; 
      border: 1px solid #cbd5e1; 
      border-radius: 0.75rem;
    }
    .dark .otp-box { border-color: #334155; background: #0f172a; color: #fff; }
    
    .sidebar-label { writing-mode: vertical-rl; transform: rotate(180deg); opacity: 0.4; }
  </style>
</head>

<body class="font-sans antialiased min-h-screen flex bg-slate-50 dark:bg-m-black text-slate-900 dark:text-white">

  <aside class="w-20 border-r border-gray-200 dark:border-slate-800 flex flex-col items-center py-10 bg-white dark:bg-m-black sticky top-0 h-screen hidden md:flex">
    <div class="sidebar-label font-bold tracking-tight text-2xl uppercase mb-auto">Mirai</div>
    <button onclick="toggleTheme()" class="p-3 mb-4 text-slate-400 hover:text-m-indigo transition-colors">
      <i id="theme-icon" class="fas fa-moon text-xl"></i>
    </button>
  </aside>

  <main class="flex-1 flex items-center justify-center p-8">
    <div class="max-w-md w-full">
      
      <div id="view-login" class="auth-card p-10">
        <header class="mb-10 border-b border-gray-100 dark:border-slate-800 pb-6 text-center">
          <h2 class="text-3xl font-extrabold tracking-tight">Login</h2>
          <p class="text-[11px] font-bold uppercase text-m-indigo tracking-[0.2em] mt-2">Assessment Pipeline Console</p>
        </header>
        <div class="space-y-6">
          <div>
            <label class="text-xs font-bold text-slate-400 mb-1 block">Email Address</label>
            <input type="email" id="login-email" class="simple-input" placeholder="admin@mirai.ai">
          </div>
          <div>
            <label class="text-xs font-bold text-slate-400 mb-1 block">Security Password</label>
            <input type="password" id="login-pass" class="simple-input" placeholder="••••••••">
          </div>
          <button onclick="requestOtp()" class="btn-primary w-full py-4 text-xl">Enter Hub</button>
          <p class="text-center text-xs font-semibold text-slate-500">
            New Recruiter? <span onclick="switchView('register')" class="text-m-indigo underline cursor-pointer">Register Hub</span>
          </p>
        </div>
      </div>

      <div id="view-register" class="auth-card p-10 hidden">
        <header class="mb-10 border-b border-gray-100 dark:border-slate-800 pb-6 text-center">
          <h2 class="text-3xl font-extrabold tracking-tight">Register</h2>
          <p class="text-[11px] font-bold uppercase text-m-indigo tracking-[0.2em] mt-2">Initialize Recruiter Profile</p>
        </header>
        <div class="space-y-4">
          <input id="reg-name" class="simple-input" placeholder="Full Name">
          <input id="reg-email" class="simple-input" placeholder="Work Email">
          <input id="reg-pass" type="password" class="simple-input" placeholder="Choose Password">
          <input id="reg-org" class="simple-input" placeholder="Organization Name">
          <button onclick="handleRegister()" class="btn-primary w-full py-4 text-xl mt-4">Initialize Account</button>
          <p class="text-center text-xs font-semibold text-slate-500">
            Already registered? <span onclick="switchView('login')" class="text-m-indigo underline cursor-pointer">Sign In</span>
          </p>
        </div>
      </div>

      <div id="view-otp" class="auth-card p-10 hidden text-center">
        <header class="mb-10 border-b border-gray-100 dark:border-slate-800 pb-6">
          <h2 class="text-3xl font-extrabold tracking-tight">Verify</h2>
          <p class="text-[11px] font-bold uppercase text-m-indigo tracking-[0.2em] mt-2">6-Digit Security Token</p>
        </header>
        <p class="text-xs font-semibold mb-6 text-slate-400" id="otp-hint">Code sent to your email.</p>
        <div class="flex justify-between mb-8" id="otp-container"></div>
        <button onclick="verifyToken()" class="btn-primary w-full py-4 text-xl mb-4">Confirm Access</button>
        <button onclick="switchView('login')" class="text-xs font-bold text-slate-400 underline">Cancel Request</button>
      </div>

      <p id="msg" class="text-center font-bold uppercase tracking-widest text-m-indigo mt-10 text-[10px]"></p>
    </div>
  </main>

 <script>
    const API = "http://localhost:8000";
    let activeEmail = "";

    function toggleTheme() {
      const root = document.getElementById('theme-root');
      const icon = document.getElementById('theme-icon');
      const isDark = root.classList.toggle('dark');
      if (icon) icon.className = isDark ? 'fas fa-sun text-xl' : 'fas fa-moon text-xl';
      localStorage.setItem('mirai-theme', isDark ? 'dark' : 'light');
    }

    function switchView(view) {
      document.getElementById('view-login').classList.add('hidden');
      document.getElementById('view-register').classList.add('hidden');
      document.getElementById('view-otp').classList.add('hidden');
      document.getElementById('view-' + view).classList.remove('hidden');
      document.getElementById('msg').innerText = ""; 
    }

    function setupOtp() {
      const container = document.getElementById('otp-container');
      container.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const input = document.createElement('input');
        input.className = 'otp-box focus:border-m-indigo outline-none';
        input.maxLength = 1;
        input.oninput = (e) => { 
          if(e.target.value && e.target.nextElementSibling) e.target.nextElementSibling.focus(); 
        };
        input.onkeydown = (e) => {
          if(e.key === 'Backspace' && !e.target.value && e.target.previousElementSibling) e.target.previousElementSibling.focus();
        };
        container.appendChild(input);
      }
    }

    async function handleRegister() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-pass').value;
      const organization = document.getElementById('reg-org').value;
      const msg = document.getElementById('msg');
      if (!name || !email || !password) { msg.innerText = "Error: Missing Required Fields"; return; }
      msg.innerText = "CREATING PROFILE...";
      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role: 'interviewer', organization })
        });
        if (res.ok) {
          msg.innerText = "ACCOUNT CREATED. PLEASE SIGN IN.";
          setTimeout(() => switchView('login'), 2000);
        } else { msg.innerText = "REGISTRATION FAILED"; }
      } catch (e) { msg.innerText = "BACKEND OFFLINE"; }
    }

    async function requestOtp() {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;
      const msg = document.getElementById('msg');
      if (!email || !pass) { msg.innerText = "ERROR: CREDENTIALS REQUIRED"; return; }
      msg.innerText = "VERIFYING CREDENTIALS...";
      try {
        const res = await fetch(`${API}/auth/send_otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });
        if (res.ok) {
          activeEmail = email;
          document.getElementById('otp-hint').innerText = `SENT TO: ${email}`;
          setupOtp();
          switchView('otp');
          msg.innerText = "";
        } else { msg.innerText = "ERROR: INVALID CREDENTIALS"; }
      } catch (e) { msg.innerText = "BACKEND OFFLINE"; }
    }

    async function verifyToken() {
      const otp = Array.from(document.querySelectorAll('.otp-box')).map(i => i.value).join('');
      const msg = document.getElementById('msg');
      if (otp.length < 6) { msg.innerText = "ERROR: COMPLETE 6-DIGIT CODE"; return; }
      try {
        const res = await fetch(`${API}/auth/verify_otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: activeEmail, otp })
        });
        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem('ai_token', data.access_token);
          msg.innerText = "ACCESS GRANTED.";
          setTimeout(() => window.location.href = "dashboard.html", 500);
        } else { msg.innerText = "ERROR: INVALID OTP"; }
      } catch (e) { msg.innerText = "VERIFICATION FAILED"; }
    }

    (function() {
      const savedTheme = localStorage.getItem('mirai-theme');
      if (savedTheme === 'dark') {
        document.getElementById('theme-root').classList.add('dark');
        const icon = document.getElementById('theme-icon');
        if (icon) icon.className = 'fas fa-sun text-xl';
      }
    })();
  </script>
</body>
</html>
